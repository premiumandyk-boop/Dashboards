<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASIA WORKDAYS — 국가별 영업일 비교</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0f1117;--bg2:#141720;--bg3:#1a1e2a;
      --card:#181c26;--card-h:#1e2230;
      --border:#2a2f3e;--bh:#3a4055;
      --gold:#d4a853;--text:#dde2f0;--text2:#8890aa;--text3:#555e78;
      --green:#52c98a;--gbg:#0c2418;--gb:#1a4832;
      --red:#e86060;--rbg:#260d0d;--rb:#4a1818;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);font-family:'DM Mono','Courier New',monospace;color:var(--text);min-height:100vh;}
    .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:24px 28px 20px;}
    .header-inner{max-width:860px;margin:0 auto;}
    .header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:16px;}
    .title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:5px;color:var(--gold);line-height:1;}
    .subtitle{font-size:11px;color:var(--text3);letter-spacing:3px;margin-top:4px;text-transform:uppercase;}
    .note{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.6;}
    .month-row{display:flex;gap:6px;flex-wrap:wrap;}
    .mbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text3);padding:5px 10px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:3px;transition:all 0.15s;min-width:36px;text-align:center;}
    .mbtn:hover{border-color:var(--bh);color:var(--text2);}
    .mbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,0.08);}
    .content{max-width:860px;margin:0 auto;padding:20px 28px 48px;}
    .col-headers{display:grid;grid-template-columns:1fr 100px 100px 110px;gap:8px;margin-bottom:6px;padding:0 14px;}
    .ch{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;text-align:center;}
    .ch:first-child{text-align:left;}
    .table{display:flex;flex-direction:column;gap:7px;}
    .row{display:grid;grid-template-columns:1fr 100px 100px 110px;gap:8px;align-items:center;background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:6px;padding:13px 14px;transition:all 0.18s;animation:fi 0.35s ease forwards;opacity:0;}
    .row:hover{background:var(--card-h);border-color:var(--bh);border-left-color:var(--gold);}
    .cc{display:flex;align-items:center;gap:10px;}
    .fl{font-size:24px;line-height:1;}
    .cn{font-size:13px;font-weight:500;}
    .ck{font-size:10px;color:var(--text3);margin-left:5px;letter-spacing:1px;}
    .nc{text-align:center;}
    .wd{font-size:16px;font-weight:500;}
    .wdc{color:var(--text);}
    .wdp{color:var(--text2);}
    .hl{font-size:10px;color:var(--text3);margin-top:2px;}
    .dc{text-align:center;}
    .db{display:inline-flex;align-items:center;gap:3px;border-radius:3px;padding:4px 10px;font-size:13px;font-weight:500;white-space:nowrap;border:1px solid;}
    .dup{color:var(--green);background:var(--gbg);border-color:var(--gb);}
    .ddn{color:var(--red);background:var(--rbg);border-color:var(--rb);}
    .dsm{color:var(--text3);background:var(--bg3);border-color:var(--border);}
    .footer{margin-top:16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text3);line-height:1.8;}
    @keyframes fi{to{opacity:1;}}
    @media(max-width:600px){.col-headers{display:none;}.row{grid-template-columns:1fr 80px 80px 90px;padding:10px;}}
  </style>

let selectedMonth = 0;

function toLocalISO(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isWeekend(d) { return d.getDay()===0||d.getDay()===6; }

function countWorkdays(year, month, hols) {
  const holSet = new Set(hols);
  let wd=0, hc=0;
  const start = month ? new Date(year,month-1,1) : new Date(year,0,1);
  const end   = month ? new Date(year,month,0)   : new Date(year,11,31);
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    if(isWeekend(d)) continue;
    wd++;
    if(holSet.has(toLocalISO(d))) hc++;
  }
  return {total: wd-hc, hols: hc};
}

function buildMonthRow(){
  let html=`<button class="mbtn ${selectedMonth===0?'active':''}" onclick="setMonth(0)">전체</button>`;
  for(let m=1;m<=12;m++)
    html+=`<button class="mbtn ${selectedMonth===m?'active':''}" onclick="setMonth(${m})">${MONTHS[m-1]}</button>`;
  document.getElementById('monthRow').innerHTML=html;
}
function setMonth(m){selectedMonth=m;buildMonthRow();renderTable();}

function renderTable(){
  let html='';
  COUNTRIES.forEach((c,i)=>{
    const cy=countWorkdays(2026,selectedMonth,HOLIDAYS[c.code][2026]);
    const py=countWorkdays(2025,selectedMonth,HOLIDAYS[c.code][2025]);
    const diff=cy.total-py.total;
    const sign=diff>0?'+':'';
    const cls=diff>0?'dup':diff<0?'ddn':'dsm';
    const arrow=diff>0?'▲':diff<0?'▼':'─';
    html+=`
      <div class="row" style="animation-delay:${i*0.04}s">
        <div class="cc"><span class="fl">${c.flag}</span><div><span class="cn">${c.name}</span><span class="ck">${c.code}</span></div></div>
        <div class="nc"><div class="wd wdc">${cy.total}일</div><div class="hl">공휴일 ${cy.hols}</div></div>
        <div class="nc"><div class="wd wdp">${py.total}일</div><div class="hl">공휴일 ${py.hols}</div></div>
        <div class="dc"><span class="db ${cls}">${arrow} ${sign}${diff}일</span></div>
      </div>`;
  });
  document.getElementById('table').innerHTML=html;
}

buildMonthRow();
renderTable();
