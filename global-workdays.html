<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GLOBAL WORKDAYS — 지역별 영업일 비교</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0f1117;--bg2:#141720;--bg3:#1a1e2a;
      --card:#181c26;--card-h:#1e2230;
      --border:#2a2f3e;--bh:#3a4055;
      --gold:#d4a853;--text:#dde2f0;--text2:#8890aa;--text3:#555e78;
      --green:#52c98a;--gbg:#0c2418;--gb:#1a4832;
      --red:#e86060;--rbg:#260d0d;--rb:#4a1818;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);font-family:'DM Mono','Courier New',monospace;color:var(--text);min-height:100vh;}
    .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:24px 28px 20px;}
    .header-inner{max-width:1000px;margin:0 auto;}
    .title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:5px;color:var(--gold);line-height:1;}
    .subtitle{font-size:11px;color:var(--text3);letter-spacing:3px;margin-top:4px;text-transform:uppercase;}
    .note{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.6;}
    .month-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
    .mbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text3);padding:5px 10px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:3px;transition:all 0.15s;min-width:36px;text-align:center;}
    .mbtn:hover{border-color:var(--bh);color:var(--text2);}
    .mbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,0.08);}
    .content{max-width:1000px;margin:0 auto;padding:20px 28px 48px;}
    .region{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .region-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);cursor:pointer;transition:background 0.15s;user-select:none;}
    .region-header:hover{background:var(--bg3);}
    .region-left{display:flex;align-items:center;gap:12px;}
    .region-icon{font-size:20px;}
    .region-name{font-size:14px;font-weight:500;color:var(--gold);letter-spacing:1px;}
    .region-count{font-size:10px;color:var(--text3);margin-left:6px;}
    .region-right{display:flex;align-items:center;gap:16px;}
    .region-avg{font-size:11px;color:var(--text2);}
    .chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;}
    .chevron.open{transform:rotate(180deg);}
    .region-body{display:none;padding:8px 10px 10px;}
    .region-body.open{display:block;}
    .col-labels{display:grid;grid-template-columns:1fr 90px 90px 100px;gap:6px;padding:4px 12px 6px;margin-bottom:4px;}
    .cl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;text-align:center;}
    .cl:first-child{text-align:left;}
    .crow{display:grid;grid-template-columns:1fr 90px 90px 100px;gap:6px;align-items:center;background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:11px 12px;margin-bottom:5px;transition:all 0.15s;animation:fi 0.3s ease forwards;opacity:0;}
    .crow:hover{background:var(--card-h);border-color:var(--bh);border-left-color:var(--gold);}
    .cc{display:flex;align-items:center;gap:9px;}
    .fl{font-size:20px;line-height:1;}
    .cn{font-size:12px;font-weight:500;}
    .ck{font-size:9px;color:var(--text3);margin-left:4px;}
    .nc{text-align:center;}
    .wd{font-size:15px;font-weight:500;}
    .wdc{color:var(--text);}
    .wdp{color:var(--text2);}
    .hl{font-size:10px;color:var(--text3);margin-top:1px;}
    .dc{text-align:center;}
    .db{display:inline-flex;align-items:center;gap:2px;border-radius:3px;padding:3px 8px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid;}
    .dup{color:var(--green);background:var(--gbg);border-color:var(--gb);}
    .ddn{color:var(--red);background:var(--rbg);border-color:var(--rb);}
    .dsm{color:var(--text3);background:var(--bg3);border-color:var(--border);}
    .footer{margin-top:20px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text3);line-height:1.8;}
    @keyframes fi{to{opacity:1;}}
    @media(max-width:600px){.col-labels{display:none;}.crow{grid-template-columns:1fr 70px 70px 80px;padding:9px 8px;gap:4px;}}
  </style>
</head>

</div>

  { id:"latam", icon:"🌎",  name:"중남미",       countries:[
    {code:"BR",name:"브라질",      flag:"🇧🇷"},
    {code:"MX",name:"멕시코",      flag:"🇲🇽"},
    {code:"AR",name:"아르헨티나",  flag:"🇦🇷"},
    {code:"CO",name:"콜롬비아",    flag:"🇨🇴"},
    {code:"CL",name:"칠레",        flag:"🇨🇱"},
    {code:"PE",name:"페루",        flag:"🇵🇪"},
    {code:"VE",name:"베네수엘라",  flag:"🇻🇪"}
  ]},
  { id:"nam",   icon:"🗽",  name:"북미",         countries:[
    {code:"US",name:"미국",        flag:"🇺🇸"},
    {code:"CA",name:"캐나다",      flag:"🇨🇦"}
  ]}
];

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let selectedMonth = 0;
const openRegions = new Set(["kr","nea","sea"]);

function toLocalISO(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function countWD(year, month, hols){
  const holSet=new Set(hols);
  let wd=0,hc=0;
  const start=month?new Date(year,month-1,1):new Date(year,0,1);
  const end=month?new Date(year,month,0):new Date(year,11,31);
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    if(d.getDay()===0||d.getDay()===6) continue;
    wd++;
    if(holSet.has(toLocalISO(d))) hc++;
  }
  return {total:wd-hc,hols:hc};
}

function buildMonthRow(){
  let html=`<button class="mbtn ${selectedMonth===0?'active':''}" onclick="setMonth(0)">전체</button>`;
  for(let m=1;m<=12;m++)
    html+=`<button class="mbtn ${selectedMonth===m?'active':''}" onclick="setMonth(${m})">${MONTHS[m-1]}</button>`;
  document.getElementById('monthRow').innerHTML=html;
}
function setMonth(m){selectedMonth=m;buildMonthRow();renderAll();}

function toggleRegion(id){
  if(openRegions.has(id)) openRegions.delete(id);
  else openRegions.add(id);
  renderAll();
}

// 총 국가 수 계산
const totalCountries = REGIONS.reduce((a,r)=>a+r.countries.length,0);

function renderAll(){
  let html='';
  REGIONS.forEach(region=>{
    const isOpen=openRegions.has(region.id);
    let totalCY=0,totalPY=0,cnt=0;
    region.countries.forEach(c=>{
      const h=HOLIDAYS[c.code];
      if(!h) return;
      const cy=countWD(2026,selectedMonth,h[2026]||[]);
      const py=countWD(2025,selectedMonth,h[2025]||[]);
      totalCY+=cy.total; totalPY+=py.total; cnt++;
    });
    const avgCY=cnt?Math.round(totalCY/cnt):0;
    const avgDiff=avgCY-(cnt?Math.round(totalPY/cnt):0);
    const avgSign=avgDiff>0?'+':'';
    const avgColor=avgDiff>0?'var(--green)':avgDiff<0?'var(--red)':'var(--text3)';

    html+=`<div class="region">
      <div class="region-header" onclick="toggleRegion('${region.id}')">
        <div class="region-left">
          <span class="region-icon">${region.icon}</span>
          <span class="region-name">${region.name}</span>
          <span class="region-count">${region.countries.length}개국</span>
        </div>
        <div class="region-right">
          <span class="region-avg" style="color:var(--text2)">평균 ${avgCY}일 &nbsp;<span style="color:${avgColor};font-size:11px">${avgDiff>=0?'▲':'▼'} ${avgSign}${avgDiff}</span></span>
          <span class="chevron ${isOpen?'open':''}">▼</span>
        </div>
      </div>
      <div class="region-body ${isOpen?'open':''}">
        <div class="col-labels">
          <div class="cl">국가</div>
          <div class="cl">2026년</div>
          <div class="cl">2025년</div>
          <div class="cl">전년 대비</div>
        </div>`;

    region.countries.forEach((c,i)=>{
      const h=HOLIDAYS[c.code];
      if(!h){
        html+=`<div class="crow" style="animation-delay:${i*0.04}s"><div class="cc"><span class="fl">${c.flag}</span><div><span class="cn">${c.name}</span><span class="ck">${c.code}</span></div></div><div class="nc" style="color:var(--text3)">—</div><div class="nc" style="color:var(--text3)">—</div><div class="dc"><span class="db dsm">—</span></div></div>`;
        return;
      }
      const cy=countWD(2026,selectedMonth,h[2026]||[]);
      const py=countWD(2025,selectedMonth,h[2025]||[]);
      const diff=cy.total-py.total;
      const sign=diff>0?'+':'';
      const cls=diff>0?'dup':diff<0?'ddn':'dsm';
      const arrow=diff>0?'▲':diff<0?'▼':'─';
      html+=`<div class="crow" style="animation-delay:${i*0.04}s">
        <div class="cc"><span class="fl">${c.flag}</span><div><span class="cn">${c.name}</span><span class="ck">${c.code}</span></div></div>
        <div class="nc"><div class="wd wdc">${cy.total}일</div><div class="hl">공휴일 ${cy.hols}</div></div>
        <div class="nc"><div class="wd wdp">${py.total}일</div><div class="hl">공휴일 ${py.hols}</div></div>
        <div class="dc"><span class="db ${cls}">${arrow} ${sign}${diff}일</span></div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  html+=`<div class="footer">
    영업일 = 평일(월~금) − 공휴일 · 대체공휴일 포함 · 주말 공휴일 제외 · 참고용<br>
    🇦🇪 UAE·🇸🇦 SA·🇮🇱 IL: 실제 일~목 근무 관행, 여기선 월~금 기준 · 이슬람 공휴일 ±1일 변동 가능<br>
    총 ${totalCountries}개국 · 11개 지역
  </div>`;

  document.getElementById('content').innerHTML=html;
}

buildMonthRow();
renderAll();
</script>
</body>
</html>
